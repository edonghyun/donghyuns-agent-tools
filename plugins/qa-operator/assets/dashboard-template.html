<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QA Operator Dashboard</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1c2430;
      --muted: #667085;
      --line: #d8dee8;
      --accent: #166a71;
      --pass: #16794c;
      --fail: #bf3434;
      --partial: #b7791f;
      --blocked: #6d5bd0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 24px 0;
    }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    h1 { margin: 0 0 8px; font-size: 32px; letter-spacing: 0; }
    .sub { margin: 0; color: var(--muted); line-height: 1.6; }
    main { padding: 20px 0 48px; }
    .toolbar, .summary, .grid { display: grid; gap: 12px; }
    .toolbar { grid-template-columns: 1fr auto auto; align-items: center; margin-bottom: 16px; }
    .summary { grid-template-columns: repeat(6, minmax(0, 1fr)); margin-bottom: 16px; }
    .metric, .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(20, 32, 44, 0.06);
    }
    .metric { padding: 12px; }
    .metric strong { display: block; font-size: 24px; }
    .metric span { color: var(--muted); font-size: 13px; }
    .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card { overflow: hidden; }
    .card-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }
    .id {
      min-width: 38px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #dff4f1;
      color: var(--accent);
      font-weight: 750;
    }
    h2 { margin: 0; font-size: 17px; line-height: 1.35; letter-spacing: 0; }
    .status {
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 700;
      background: #f1f5f9;
      color: #475467;
    }
    .PASS { background: #edf9f2; color: var(--pass); }
    .FAIL { background: #fff0f0; color: var(--fail); }
    .PARTIAL { background: #fff7e8; color: var(--partial); }
    .BLOCKED { background: #f2f0ff; color: var(--blocked); }
    .card-body { padding: 14px; display: grid; gap: 12px; }
    .cycle { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
    .step { border: 1px solid var(--line); border-radius: 8px; padding: 8px; font-size: 12px; background: #fbfcfd; }
    .shots { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .shot {
      border: 1px dashed var(--line);
      border-radius: 8px;
      min-height: 92px;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      background: #fbfcfd;
    }
    .shot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    a.shot { cursor: zoom-in; text-decoration: none; }
    .shot-viewer[hidden] { display: none; }
    .shot-viewer {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .shot-viewer-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.74);
    }
    .shot-viewer-panel {
      position: relative;
      z-index: 1;
      width: min(1280px, calc(100vw - 48px));
      max-height: calc(100vh - 48px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      background: #0f172a;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
    }
    .shot-viewer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
    }
    .shot-viewer-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }
    .shot-viewer-title strong,
    .shot-viewer-title span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shot-viewer-title span { color: #cbd5e1; font-size: 12px; }
    .shot-viewer-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }
    .shot-viewer-button,
    .shot-viewer-link {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font: inherit;
      font-size: 13px;
      padding: 0 10px;
      text-decoration: none;
    }
    .shot-viewer-button:hover,
    .shot-viewer-link:hover { background: rgba(255, 255, 255, 0.14); }
    .shot-viewer-frame {
      min-height: 0;
      overflow: auto;
      background: #020617;
    }
    .shot-viewer-frame img {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: calc(100vh - 132px);
      margin: 0 auto;
      cursor: zoom-in;
    }
    .shot-viewer-frame.is-actual img {
      max-width: none;
      max-height: none;
      cursor: zoom-out;
    }
    body.shot-viewer-open { overflow: hidden; }
    .notes, .risks, .meta-row { color: var(--muted); line-height: 1.55; font-size: 13px; white-space: pre-wrap; }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .requirement-block {
      margin: 12px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcfd;
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }
    .requirement-title {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .requirement-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }
    .requirement-list {
      margin: 8px 0 0 18px;
      padding: 0;
      color: var(--muted);
    }
    .requirement-list li { margin: 3px 0; }
    .test-case-list {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }
    .test-case-list ol {
      margin: 6px 0 0 20px;
      padding: 0;
      color: var(--muted);
    }
    .test-case-list li { margin: 5px 0; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: #fbfcfd;
      color: #475467;
      font-size: 12px;
    }
    button, select {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 0 10px;
    }
    .error {
      margin-bottom: 16px;
      border: 1px solid #f1b6b6;
      background: #fff4f4;
      color: #8a2424;
      padding: 12px;
      border-radius: 8px;
      display: none;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      .toolbar, .summary, .grid { grid-template-columns: 1fr; }
      .cycle, .shots { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1 id="title">QA Operator Dashboard</h1>
      <p class="sub" id="subtitle">Loading manifest, plan, and latest results...</p>
    </div>
  </header>
  <main class="wrap">
    <div class="toolbar">
      <div class="sub" id="updated">Waiting for data</div>
      <select id="filter">
        <option value="ALL">All statuses</option>
        <option value="PENDING">PENDING</option>
        <option value="PASS">PASS</option>
        <option value="PARTIAL">PARTIAL</option>
        <option value="FAIL">FAIL</option>
        <option value="BLOCKED">BLOCKED</option>
        <option value="N/A">N/A</option>
      </select>
      <button id="refresh">Refresh</button>
    </div>
    <div class="error" id="error"></div>
    <section class="summary" id="summary"></section>
    <section class="grid" id="cards"></section>
  </main>
  <div class="shot-viewer" id="shot-viewer" role="dialog" aria-modal="true" aria-label="Screenshot preview" hidden>
    <div class="shot-viewer-backdrop" data-shot-viewer-close></div>
    <div class="shot-viewer-panel">
      <div class="shot-viewer-bar">
        <div class="shot-viewer-title">
          <strong>Screenshot preview</strong>
          <span id="shot-viewer-caption"></span>
        </div>
        <div class="shot-viewer-actions">
          <button class="shot-viewer-button" id="shot-viewer-zoom" type="button">Actual size</button>
          <a class="shot-viewer-link" id="shot-viewer-open" href="#" target="_blank" rel="noopener noreferrer">Open original</a>
          <button class="shot-viewer-button" type="button" data-shot-viewer-close>Close</button>
        </div>
      </div>
      <div class="shot-viewer-frame" id="shot-viewer-frame">
        <img id="shot-viewer-image" alt="" />
      </div>
    </div>
  </div>
  <script>
    const statuses = ["PENDING", "PASS", "PARTIAL", "FAIL", "BLOCKED", "N/A"];
    const cycleLabels = { server: "Server", login: "Login", feature: "Feature", validation: "Validation", ux: "UX" };
    let state = { manifest: null, plan: null, results: null };
    let shotViewerActualSize = false;

    async function fetchJson(path) {
      const response = await fetch(path + "?t=" + Date.now(), { cache: "no-store" });
      if (!response.ok) throw new Error(`${path}: ${response.status}`);
      return response.json();
    }

    async function loadData() {
      const error = document.querySelector("#error");
      try {
        const manifest = await fetchJson("manifest.json");
        const plan = await fetchJson(manifest.planPath || "qa-plan.json");
        const resultsPath = manifest.resultsPath || `runs/${manifest.latestRun}/qa-results.json`;
        const results = await fetchJson(resultsPath);
        state = { manifest, plan, results };
        error.style.display = "none";
        render();
      } catch (err) {
        error.style.display = "block";
        error.textContent = `Could not load dashboard JSON. Serve this folder over HTTP, not file://. ${err.message}`;
      }
    }

    function renderSummary() {
      const counts = { PENDING: 0, PASS: 0, PARTIAL: 0, FAIL: 0, BLOCKED: 0, "N/A": 0, ...(state.results.summary || {}) };
      document.querySelector("#summary").innerHTML = statuses.map(status => `
        <div class="metric ${statusClass(status)}">
          <strong>${escapeHtml(counts[status] || 0)}</strong>
          <span>${escapeHtml(status)}</span>
        </div>
      `).join("");
    }

    function itemPlan(id) {
      return (state.plan.items || []).find(item => String(item.id) === String(id)) || {};
    }

    function renderCards() {
      const filter = document.querySelector("#filter").value;
      const items = (state.results.items || []).filter(item => filter === "ALL" || item.status === filter);
      document.querySelector("#cards").innerHTML = items.map(item => {
        const plan = itemPlan(item.id);
        const shots = (item.evidence?.screenshots || []).slice(-6);
        const status = item.status || "PENDING";
        const risks = item.uxRisks || [];
        const lock = item.lock ? `lock: ${item.lock.owner || "unknown"} until ${item.lock.expiresAt || "manual release"}` : "unlocked";
        return `
          <article class="card">
            <div class="card-head">
              <div class="id">${escapeHtml(item.id)}</div>
              <div>
                <h2>${escapeHtml(item.title || plan.title || "QA item")}</h2>
                <div class="sub">${escapeHtml(plan.area || plan.requirement || "")}</div>
              </div>
              <div class="status ${statusClass(status)}">${escapeHtml(status)}</div>
            </div>
            <div class="card-body">
              <div class="meta-row">
                <span class="pill">phase: ${escapeHtml(item.phase || "planned")}</span>
                <span class="pill">owner: ${escapeHtml(item.owner || "none")}</span>
                <span class="pill">${escapeHtml(lock)}</span>
                <span class="pill">repair: ${escapeHtml(item.repairStatus || "not-started")}</span>
              </div>
              ${renderPlanRequirements(plan, item)}
              <div class="cycle">
                ${Object.entries(cycleLabels).map(([key, label]) => {
                  const cycleStatus = item.cycle?.[key] || "PENDING";
                  return `<div class="step ${statusClass(cycleStatus)}"><strong>${escapeHtml(label)}</strong><br>${escapeHtml(cycleStatus)}</div>`;
                }).join("")}
              </div>
              <div class="shots">
                ${shots.length ? shots.map(rawPath => {
                  const path = evidencePath(rawPath);
                  return `<a class="shot" href="${escapeAttr(path)}" aria-label="Open screenshot preview: ${escapeAttr(rawPath)}" title="Click to enlarge"><img src="${escapeAttr(path)}" alt="${escapeAttr(rawPath)}"></a>`;
                }).join("") : `<div class="shot">No screenshots yet</div>`}
              </div>
              ${risks.length ? `<div class="risks"><strong>UX risks</strong>\n${escapeHtml(risks.map(r => r.summary || JSON.stringify(r)).join("\n"))}</div>` : ""}
              ${item.notes ? `<div class="notes">${escapeHtml(item.notes)}</div>` : ""}
            </div>
          </article>
        `;
      }).join("");
    }

    function renderPlanRequirements(plan, item) {
      const requirement = String(plan.requirement || "").trim();
      const expected = String(plan.expected || plan.expectedBehavior || "").trim();
      const area = String(plan.area || "").trim();
      const actors = normalizeList(plan.actors);
      const acceptance = normalizeList(plan.acceptance);
      const testCases = normalizeCaseList(plan.testCases || item.testCases);
      const controller = plan.caseController || item.caseController || {};
      const strategy = String(controller.strategy || "").trim();
      if (!requirement && !expected && !area && !actors.length && !acceptance.length && !testCases.length) return "";
      const meta = [
        area ? `<span class="pill">area: ${escapeHtml(area)}</span>` : "",
        actors.length ? `<span class="pill">actor: ${escapeHtml(actors.join(", "))}</span>` : "",
        strategy ? `<span class="pill">case: ${escapeHtml(strategy)}</span>` : "",
      ].filter(Boolean).join("");
      return `
        <div class="requirement-block">
          ${requirement ? `<div class="requirement-title">Requirement<span class="pill">${escapeHtml(requirement)}</span></div>` : ""}
          ${expected ? `<div><strong>Expected</strong><br>${escapeHtml(expected)}</div>` : ""}
          ${meta ? `<div class="requirement-meta">${meta}</div>` : ""}
          ${acceptance.length ? `<ul class="requirement-list">${acceptance.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>` : ""}
          ${testCases.length ? `<div class="test-case-list"><strong>Planned test cases</strong><ol>${testCases.map(testCase => `<li>${renderTestCase(testCase)}</li>`).join("")}</ol></div>` : ""}
        </div>
      `;
    }

    function normalizeList(value) {
      if (Array.isArray(value)) return value.map(item => String(item || "").trim()).filter(Boolean);
      const text = String(value || "").trim();
      return text ? [text] : [];
    }

    function normalizeCaseList(value) {
      if (!value) return [];
      if (Array.isArray(value)) return value.filter(Boolean);
      return [value];
    }

    function renderTestCase(testCase) {
      const id = String(testCase.id || "").trim();
      const title = String(testCase.title || testCase.expected || "Untitled test case").trim();
      const expected = String(testCase.expected || "").trim();
      const prefix = id ? `<strong>${escapeHtml(id)}</strong> ` : "";
      const expectedText = expected && expected !== title ? `<br><span>${escapeHtml(expected)}</span>` : "";
      return `${prefix}${escapeHtml(title)}${expectedText}`;
    }

    function render() {
      document.querySelector("#title").textContent = state.manifest.title || state.manifest.slug || "QA Operator Dashboard";
      document.querySelector("#subtitle").textContent = `${state.manifest.source || "No source"} ${state.manifest.range || ""}`.trim();
      document.querySelector("#updated").textContent = `Run ${state.results.runId || state.manifest.latestRun} updated ${state.results.updatedAt || "unknown"}`;
      renderSummary();
      renderCards();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function statusClass(value) {
      const status = String(value || "PENDING");
      return ["PASS", "FAIL", "PARTIAL", "BLOCKED"].includes(status) ? status : "";
    }

    function evidencePath(value) {
      const path = String(value || "");
      if (/^(https?:|file:)/.test(path) || path.startsWith("data:image/") || path.startsWith("runs/")) return path;
      if (/^(screenshots|traces|issues)\//.test(path)) {
        const runId = state.results.runId || state.manifest.latestRun;
        return `runs/${runId}/${path}`;
      }
      if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(path)) return "#";
      return path;
    }

    function openShotViewer(src, caption) {
      const viewer = document.querySelector("#shot-viewer");
      const image = document.querySelector("#shot-viewer-image");
      const openLink = document.querySelector("#shot-viewer-open");
      document.querySelector("#shot-viewer-caption").textContent = caption || src;
      image.src = src;
      image.alt = caption || "Screenshot preview";
      openLink.href = src;
      setShotViewerZoom(false);
      viewer.hidden = false;
      document.body.classList.add("shot-viewer-open");
      document.querySelector("#shot-viewer-zoom").focus();
    }

    function closeShotViewer() {
      const viewer = document.querySelector("#shot-viewer");
      viewer.hidden = true;
      document.querySelector("#shot-viewer-image").removeAttribute("src");
      document.body.classList.remove("shot-viewer-open");
    }

    function setShotViewerZoom(actualSize) {
      shotViewerActualSize = actualSize;
      document.querySelector("#shot-viewer-frame").classList.toggle("is-actual", actualSize);
      document.querySelector("#shot-viewer-zoom").textContent = actualSize ? "Fit to screen" : "Actual size";
    }

    document.querySelector("#refresh").addEventListener("click", loadData);
    document.querySelector("#filter").addEventListener("change", renderCards);
    document.querySelector("#cards").addEventListener("click", event => {
      const link = event.target.closest("a.shot");
      if (!link || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
      event.preventDefault();
      const image = link.querySelector("img");
      openShotViewer(link.href, image?.alt || link.getAttribute("href"));
    });
    document.querySelector("#shot-viewer-zoom").addEventListener("click", () => {
      setShotViewerZoom(!shotViewerActualSize);
    });
    document.querySelector("#shot-viewer-image").addEventListener("click", () => {
      setShotViewerZoom(!shotViewerActualSize);
    });
    document.querySelectorAll("[data-shot-viewer-close]").forEach(element => {
      element.addEventListener("click", closeShotViewer);
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !document.querySelector("#shot-viewer").hidden) {
        closeShotViewer();
      }
    });
    loadData();
    setInterval(loadData, 3000);
  </script>
</body>
</html>
